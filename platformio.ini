; Giraffegotchi — ESP32-2432S028R (Cheap Yellow Display)
; Display: ILI9341 240x320 on HSPI  |  Touch: XPT2046 on its own VSPI bus

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
extra_scripts = pre:tools/load_env.py
lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
  bitbank2/PNGdec@^1.1.0
build_flags =
  ; --- TFT_eSPI config for the CYD (no User_Setup.h edits) ---
  -DUSER_SETUP_LOADED=1
  -DILI9341_2_DRIVER=1
  ; CYD wires the display to HSPI; touch (XPT2046) uses VSPI. Force the
  ; display onto HSPI so the two SPI peripherals don't collide.
  -DUSE_HSPI_PORT=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MISO=12
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=-1
  -DTFT_BL=21
  -DTFT_BACKLIGHT_ON=HIGH
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=20000000
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1

; Hardware-free pet-logic tests run natively (only pet.cpp is compiled here)
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = -<*> +<pet.cpp>
